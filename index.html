<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SKWS Family</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri&family=Tiro+Bangla&display=swap" rel="stylesheet"/>

<style>
body { font-family:'Hind Siliguri', sans-serif; background:#0a1628; color:#fff; margin:0; }
header { text-align:center; padding:20px; }
.site-title { font-family:'Tiro Bangla'; font-size:26px; }
.shop-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; padding:20px; }
.shop-card { background:#112240; padding:15px; border-radius:10px; cursor:pointer; }
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.8); display:none; justify-content:center; align-items:center;}
.modal-overlay.open { display:flex; }
.modal { background:#112240; padding:20px; max-width:500px; width:100%; border-radius:12px; }
input, textarea { width:100%; padding:10px; margin-bottom:10px; border-radius:6px; border:none; }
button { padding:10px 20px; border:none; background:#c9a84c; cursor:pointer; border-radius:6px; }
</style>
</head>

<body>

<header>
  <div class="site-title">সত্যের কাফেলা ওয়েলফেয়ার সোসাইটি ফ্যামিলি</div>
</header>

<!-- ADMIN PANEL -->
<div style="padding:20px; max-width:600px; margin:auto;">
  <h3>Admin Panel</h3>

  <input id="name" placeholder="Shop Name">
  <input id="owner" placeholder="Owner Name">
  <input id="category" placeholder="Category (food, clothing...)">
  <input id="area" placeholder="Area">
  <input id="phone" placeholder="Phone">
  <input id="whatsapp" placeholder="WhatsApp">
  <input id="photo" placeholder="Photo URLs (use | for multiple)">
  <textarea id="description" placeholder="Description"></textarea>

  <button onclick="addShop()">Add Shop</button>
</div>

<!-- SHOP GRID -->
<div class="shop-grid" id="shopGrid"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<footer style="text-align:center;padding:20px;">
© ২০২৫ SKWS ফ্যামিলি
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 PUT YOUR CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allShops = [];

async function loadShops() {
  const snapshot = await getDocs(collection(db, "shops"));
  allShops = [];
  snapshot.forEach(doc => allShops.push(doc.data()));
  renderShops();
}

function renderShops() {
  const grid = document.getElementById("shopGrid");
  grid.innerHTML = "";

  allShops.forEach(shop => {
    const div = document.createElement("div");
    div.className = "shop-card";
    div.innerHTML = `
      <b>${shop.name}</b><br>
      <small>${shop.area}</small>
    `;
    div.onclick = () => openModal(shop);
    grid.appendChild(div);
  });
}

async function addShop() {
  const shop = {
    name: name.value,
    owner: owner.value,
    category: category.value,
    area: area.value,
    phone: phone.value,
    whatsapp: whatsapp.value,
    photo: photo.value,
    description: description.value
  };

  await addDoc(collection(db, "shops"), shop);
  alert("Added!");
  loadShops();
}

function openModal(shop) {
  const photos = shop.photo ? shop.photo.split('|') : [];

  document.getElementById("modalContent").innerHTML = `
    <h3>${shop.name}</h3>
    <p>${shop.description || ""}</p>

    <div style="display:flex;overflow:auto;gap:10px;">
      ${photos.map(p => `<img src="${p.trim()}" style="height:150px;border-radius:8px;">`).join('')}
    </div>

    <p>📍 ${shop.area}</p>
    <p>📞 ${shop.phone || ""}</p>
  `;

  document.getElementById("modalOverlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
}

loadShops();

</script>

</body>
</html>
