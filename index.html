<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SKWS Family - সেবা ডিরেক্টরি</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0a1628;
      --navy-mid: #112240;
      --navy-light: #1a3a6b;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-pale: #f5e6b8;
      --cream: #faf8f2;
      --white: #ffffff;
      --text-main: #e8e8e8;
      --text-muted: #8899bb;
      --card-bg: #0f1f3d;
      --card-border: #1e3a6e;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hind Siliguri', sans-serif;
      background-color: var(--navy);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── BACKGROUND TEXTURE ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(26,58,107,0.4) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(201,168,76,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── HEADER ─── */
    header {
      position: relative;
      z-index: 10;
      background: linear-gradient(160deg, #0d1e3f 0%, #0a1628 60%, #0d1a30 100%);
      border-bottom: 1px solid rgba(201,168,76,0.3);
      padding: 32px 24px 28px;
      text-align: center;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 500px; height: 200px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo-wrap {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 20px;
      max-width: 680px;
      margin: 0 auto;
    }

    .logo-img {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(201,168,76,0.5);
      box-shadow: 0 0 28px rgba(201,168,76,0.25), 0 4px 20px rgba(0,0,0,0.5);
      flex-shrink: 0;
      animation: pulse-glow 3.5s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(201,168,76,0.2), 0 4px 20px rgba(0,0,0,0.5); }
      50%       { box-shadow: 0 0 40px rgba(201,168,76,0.45), 0 4px 20px rgba(0,0,0,0.5); }
    }

    .header-text {
      text-align: left;
    }

    .site-org-en {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
      margin-bottom: 4px;
    }

    .site-title {
      font-family: 'Tiro Bangla', serif;
      font-size: clamp(20px, 5vw, 30px);
      color: var(--white);
      line-height: 1.25;
      margin-bottom: 5px;
    }

    .site-tagline {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 400;
      line-height: 1.5;
    }

    .site-tagline span {
      color: var(--gold);
      font-weight: 500;
    }

    .gold-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, var(--gold), rgba(201,168,76,0.2));
      margin: 6px 0;
    }

    /* ─── RESPONSIVE HEADER ─── */
    @media (max-width: 480px) {
      .logo-wrap { flex-direction: column; gap: 14px; text-align: center; }
      .header-text { text-align: center; }
      .gold-line { background: linear-gradient(90deg, transparent, var(--gold), transparent); }
      .site-org-en { letter-spacing: 1.5px; }
    }

    /* ─── MAIN CONTAINER ─── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 16px 60px;
    }

    /* ─── SEARCH BAR ─── */
    .search-section {
      margin-bottom: 32px;
      animation: fadeUp 0.5s ease both;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 50px;
      padding: 4px 4px 4px 20px;
      gap: 10px;
      box-shadow: var(--shadow);
      transition: border-color 0.3s;
    }

    .search-box:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15), var(--shadow);
    }

    .search-icon {
      font-size: 18px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text-main);
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 16px;
      padding: 10px 0;
    }

    .search-box input::placeholder { color: var(--text-muted); }

    .search-btn {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy);
      border: none;
      border-radius: 40px;
      padding: 10px 22px;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .search-btn:hover {
      transform: scale(1.04);
      box-shadow: 0 4px 16px rgba(201,168,76,0.4);
    }

    /* ─── CATEGORY FILTERS ─── */
    .filter-section {
      margin-bottom: 32px;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .filter-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      border-radius: 30px;
      padding: 8px 18px;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--navy-light);
      border-color: var(--gold);
      color: var(--gold-light);
    }

    .filter-btn.active {
      box-shadow: 0 0 12px rgba(201,168,76,0.2);
    }

    .cat-icon { font-size: 16px; }

    /* ─── RESULTS COUNT ─── */
    .results-info {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
      animation: fadeUp 0.5s 0.15s ease both;
    }

    .results-info span { color: var(--gold-light); font-weight: 600; }

    /* ─── SHOP GRID ─── */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    .shop-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
      overflow: hidden;
    }

    .shop-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .shop-card:hover {
      border-color: var(--gold);
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5), 0 0 20px rgba(201,168,76,0.1);
    }

    .shop-card:hover::before { opacity: 1; }

    .card-cat-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      color: var(--gold);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .card-shop-name {
      font-family: 'Tiro Bangla', serif;
      font-size: 18px;
      color: var(--white);
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .card-owner-name {
      font-family: 'Tiro Bangla', serif;
      font-size: 18px;
      color: var(--white);
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .card-service-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-style: italic;
    }

    .card-area {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .card-arrow {
      position: absolute;
      bottom: 16px;
      right: 16px;
      color: var(--gold);
      font-size: 18px;
      opacity: 0;
      transform: translateX(-6px);
      transition: all 0.3s;
    }

    .shop-card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      display: none;
    }

    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 16px; }

    /* ─── MODAL OVERLAY ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 12, 28, 0.85);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--navy-mid);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      max-width: 520px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 40px rgba(201,168,76,0.1);
      transform: translateY(20px) scale(0.97);
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 16px 16px 0 0;
      background: linear-gradient(135deg, var(--navy-light), var(--navy));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }

    .modal-img-placeholder {
      width: 100%;
      height: 200px;
      border-radius: 16px 16px 0 0;
      background: linear-gradient(135deg, var(--navy-light) 0%, var(--navy) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }

    .modal-body {
      padding: 24px;
    }

    .modal-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--gold);
      margin-bottom: 14px;
    }

    .modal-title {
      font-family: 'Tiro Bangla', serif;
      font-size: 24px;
      color: var(--white);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .modal-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
      margin: 16px 0;
      opacity: 0.4;
    }

    .modal-info-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
      font-size: 15px;
      color: var(--text-main);
    }

    .modal-info-row .info-icon {
      font-size: 18px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .modal-info-row .info-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal-info-row a {
      color: var(--gold-light);
      text-decoration: none;
    }

    .modal-info-row a:hover { text-decoration: underline; }

    .contact-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .btn-phone {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--navy-light);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      border-radius: 10px;
      padding: 12px;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s;
    }

    .btn-phone:hover {
      border-color: var(--gold);
      color: var(--gold-light);
    }

    .btn-maps {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #1a73e8;
      border: 1px solid #1558b0;
      color: #fff;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s;
    }

    .btn-maps:hover {
      background: #1558b0;
      box-shadow: 0 4px 16px rgba(26,115,232,0.4);
    }

    .btn-whatsapp {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #25D366;
      border: 1px solid #1ebe5d;
      color: #fff;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s;
    }

    .btn-whatsapp:hover {
      background: #1ebe5d;
      box-shadow: 0 4px 16px rgba(37,211,102,0.4);
    }

    .btn-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: inline-block;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--white);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 10;
    }

    .modal-close:hover { background: rgba(201,168,76,0.3); }

    /* ─── LOADING SPINNER ─── */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--card-border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── FOOTER ─── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 13px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    footer span { color: var(--gold); }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--navy); }
    ::-webkit-scrollbar-thumb { background: var(--navy-light); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 500px) {
      .shop-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .modal-title { font-size: 20px; }
      .contact-buttons { flex-direction: column; }
    }

    @media (max-width: 340px) {
      .shop-grid { grid-template-columns: 1fr; }
    }

    /* ─── ADMIN NOTE BANNER ─── */
    .admin-note {
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 28px;
      font-size: 13px;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.5s 0.05s ease both;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo-wrap">
      <img src="logo.jpg" alt="SKWS Logo" class="logo-img" />
      <div class="header-text">
        <div class="site-org-en">Satyer Kafela Welfare Society</div>
        <div class="gold-line"></div>
        <div class="site-title">সত্যের কাফেলা ওয়েলফেয়ার সোসাইটি</div>
        <div class="site-tagline">৩ নং ওয়ার্ড, সিদ্ধিরগঞ্জ, নারায়ণগঞ্জ &nbsp;·&nbsp; <span>সেবা ও পণ্য ডিরেক্টরি</span></div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- SEARCH -->
    <section class="search-section">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="দোকান বা সেবা খুঁজুন..." autocomplete="off" />
        <button class="search-btn" onclick="doSearch()">খুঁজুন</button>
      </div>
    </section>

    <!-- CATEGORY FILTERS -->
    <section class="filter-section">
      <div class="filter-label">বিভাগ</div>
      <div class="filter-buttons" id="filterButtons">
        <button class="filter-btn active" data-cat="all" onclick="filterCat(this)">
          <span class="cat-icon">🌐</span> সবাই
        </button>
        <button class="filter-btn" data-cat="food" onclick="filterCat(this)">
          <span class="cat-icon">🛒</span> খাদ্য ও মুদিখানা
        </button>
        <button class="filter-btn" data-cat="clothing" onclick="filterCat(this)">
          <span class="cat-icon">👗</span> পোশাক ও টেইলার
        </button>
        <button class="filter-btn" data-cat="health" onclick="filterCat(this)">
          <span class="cat-icon">🏥</span> স্বাস্থ্য ও চিকিৎসা
        </button>
        <button class="filter-btn" data-cat="electronics" onclick="filterCat(this)">
          <span class="cat-icon">🔧</span> ইলেকট্রনিক্স ও মেরামত
        </button>
        <button class="filter-btn" data-cat="education" onclick="filterCat(this)">
          <span class="cat-icon">📚</span> শিক্ষা ও প্রতিষ্ঠান
        </button>
        <button class="filter-btn" data-cat="other" onclick="filterCat(this)">
          <span class="cat-icon">🤝</span> অন্যান্য সেবা
        </button>
      </div>
    </section>

    <!-- LOADING -->
    <div class="loading" id="loadingEl">
      <div class="spinner"></div>
      <p>তথ্য লোড হচ্ছে...</p>
    </div>

    <!-- RESULTS INFO -->
    <div class="results-info" id="resultsInfo" style="display:none;">
      মোট <span id="resultsCount">0</span>টি দোকান পাওয়া গেছে
    </div>

    <!-- SHOP GRID -->
    <div class="shop-grid" id="shopGrid"></div>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🔎</div>
      <p>কোনো দোকান পাওয়া যায়নি</p>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>© ২০২৫ <span>SKWS Family</span> — সকলের জন্য সেবা</p>
  </footer>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────
    // CONFIGURATION — UPDATE THESE VALUES
    // ─────────────────────────────────────────────

    // STEP 1: Publish your Google Sheet as CSV
    // File → Share → Publish to web → CSV → Copy link
    // Replace the URL below with your published CSV link
    const SHEET_CSV_URL = 'YOUR_GOOGLE_SHEET_CSV_URL_HERE';

        facebook: '',
        maplink: ''
      }

    // ─────────────────────────────────────────────
    // CATEGORY MAP
    // ─────────────────────────────────────────────
    const CAT_MAP = {
      food:        { label: 'খাদ্য ও মুদিখানা',        icon: '🛒', personal: false },
      clothing:    { label: 'পোশাক ও টেইলার',          icon: '👗', personal: false },
      health:      { label: 'স্বাস্থ্য ও চিকিৎসা',    icon: '🏥', personal: false },
      electronics: { label: 'ইলেকট্রনিক্স ও মেরামত',  icon: '🔧', personal: false },
      education:   { label: 'শিক্ষা ও প্রতিষ্ঠান',    icon: '📚', personal: true  },
      other:       { label: 'অন্যান্য সেবা',            icon: '🤝', personal: true  },
    };

    // ─────────────────────────────────────────────
    // STATE
    // ─────────────────────────────────────────────
    let allShops = [];
    let activeCategory = 'all';
    let searchQuery = '';

    // ─────────────────────────────────────────────
    // LOAD DATA
    // ─────────────────────────────────────────────
    async function loadShops() {
      if (SHEET_CSV_URL === 'YOUR_GOOGLE_SHEET_CSV_URL_HERE') {
        // Use demo data
        allShops = DEMO_SHOPS;
        hideLoading();
        renderShops();
        return;
      }

      try {
        const res = await fetch(SHEET_CSV_URL);
        const text = await res.text();
        allShops = parseCSV(text);
        hideLoading();
        renderShops();
      } catch (e) {
        console.error('Sheet load failed, using demo data', e);
        allShops = DEMO_SHOPS;
        hideLoading();
        renderShops();
      }
    }

    // ─────────────────────────────────────────────
    // CSV PARSER
    // Expected columns (row 1 = headers, skip):
    // name | category | owner | area | address | phone | whatsapp | photo | description | facebook | maplink
    // ─────────────────────────────────────────────
    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const shops = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
        if (!cols[0]) continue;
        shops.push({
          name:        cols[0] || '',
          category:    (cols[1] || '').toLowerCase(),
          owner:       cols[2] || '',
          area:        cols[3] || '',
          address:     cols[4] || '',
          phone:       cols[5] || '',
          whatsapp:    cols[6] || '',
          photo:       cols[7] || '',
          description: cols[8] || '',
          facebook:    cols[9] || '',
          maplink:     cols[10] || '',
        });
      }
      return shops;
    }

    // ─────────────────────────────────────────────
    // FILTER + SEARCH + RENDER
    // ─────────────────────────────────────────────
    function getFiltered() {
      return allShops.filter(s => {
        const matchCat = activeCategory === 'all' || s.category === activeCategory;
        const q = searchQuery.toLowerCase();
        const matchSearch = !q || s.name.toLowerCase().includes(q) || s.area.toLowerCase().includes(q) || (s.description || '').toLowerCase().includes(q);
        return matchCat && matchSearch;
      });
    }

    function renderShops() {
      const filtered = getFiltered();
      const grid = document.getElementById('shopGrid');
      const empty = document.getElementById('emptyState');
      const info = document.getElementById('resultsInfo');
      const count = document.getElementById('resultsCount');

      grid.innerHTML = '';
      info.style.display = filtered.length > 0 ? 'block' : 'none';
      empty.style.display = filtered.length === 0 ? 'block' : 'none';
      count.textContent = filtered.length;

      filtered.forEach((shop, idx) => {
        const cat = CAT_MAP[shop.category] || { label: shop.category, icon: '🏪', personal: false };
        const isPersonal = cat.personal && shop.owner;
        const card = document.createElement('div');
        card.className = 'shop-card';
        card.style.animationDelay = `${idx * 0.05}s`;
        card.style.animation = 'fadeUp 0.4s ease both';
        card.innerHTML = `
          <div class="card-cat-badge">${cat.icon} ${cat.label}</div>
          ${isPersonal
            ? `<div class="card-owner-name">${shop.owner}</div>
               <div class="card-service-label">${shop.name}</div>`
            : `<div class="card-shop-name">${shop.name}</div>
               ${shop.owner ? `<div class="card-service-label">মালিক: ${shop.owner}</div>` : ''}`
          }
          <div class="card-area">📍 ${shop.area}</div>
          <div class="card-arrow">→</div>
        `;
        card.addEventListener('click', () => openModal(shop));
        grid.appendChild(card);
      });
    }

    // ─────────────────────────────────────────────
    // FILTER BUTTONS
    // ─────────────────────────────────────────────
    function filterCat(btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat;
      renderShops();
    }

    // ─────────────────────────────────────────────
    // SEARCH
    // ─────────────────────────────────────────────
    function doSearch() {
      searchQuery = document.getElementById('searchInput').value.trim();
      renderShops();
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('searchInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') doSearch();
      });
    });

    // ─────────────────────────────────────────────
    // MODAL
    // ─────────────────────────────────────────────
    function openModal(shop) {
      const cat = CAT_MAP[shop.category] || { label: shop.category, icon: '🏪', personal: false };
      const isPersonal = cat.personal && shop.owner;
      const content = document.getElementById('modalContent');

      const imgHtml = shop.photo
        ? `<img src="${shop.photo}" alt="${shop.name}" class="modal-img" onerror="this.style.display='none';document.getElementById('imgPlaceholder').style.display='flex'" />`
        : '';

      const phoneBtns = shop.phone ? `
        <a class="btn-phone" href="tel:${shop.phone}">

          ফোন করুন
        </a>` : '';

      const waBtns = shop.whatsapp ? `
        <a class="btn-whatsapp" href="https://wa.me/${shop.whatsapp.replace(/\D/g,'')}" target="_blank">
          <svg class="btn-icon" viewBox="0 0 32 32" fill="currentColor"><path d="M16.003 2.667C8.64 2.667 2.667 8.64 2.667 16c0 2.347.64 4.64 1.853 6.667L2.667 29.333l6.88-1.813A13.253 13.253 0 0016.003 29.333C23.36 29.333 29.333 23.36 29.333 16S23.36 2.667 16.003 2.667zm0 2.666c5.88 0 10.664 4.787 10.664 10.667S21.883 26.667 16.003 26.667c-1.947 0-3.84-.533-5.493-1.547l-.387-.24-4.013 1.054 1.054-3.893-.267-.4A10.627 10.627 0 015.337 16C5.337 10.12 10.12 5.333 16.003 5.333zm-3.2 5.334c-.24 0-.613.093-.947.453-.32.347-1.24 1.213-1.24 2.96 0 1.747 1.267 3.44 1.44 3.68.187.24 2.48 3.813 6.027 5.2 3 1.173 3.547.933 4.187.88.64-.053 2.08-.853 2.373-1.68.293-.827.293-1.533.2-1.68-.093-.147-.333-.24-.693-.427-.36-.187-2.08-1.027-2.4-1.147-.32-.12-.56-.187-.8.187-.24.36-.92 1.147-1.12 1.387-.2.24-.4.267-.76.08-.36-.187-1.52-.56-2.893-1.787-1.067-.96-1.787-2.133-2-2.493-.2-.36-.013-.547.16-.733.16-.16.36-.427.547-.64.187-.213.24-.36.36-.6.12-.24.067-.453-.013-.64-.08-.187-.8-1.947-1.12-2.667-.293-.693-.6-.587-.8-.6-.2-.013-.44-.013-.68-.013z"/></svg>
          WhatsApp
        </a>` : '';

      const mapBtn = shop.maplink ? `
        <a class="btn-maps" href="${shop.maplink}" target="_blank">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          গুগল ম্যাপ
        </a>` : '';

      const fbRow = shop.facebook ? `
        <div class="modal-info-row">
          <span class="info-icon">📘</span>
          <div>
            <div class="info-label">ফেসবুক</div>
            <a href="${shop.facebook}" target="_blank">ফেসবুক পেজ দেখুন</a>
          </div>
        </div>` : '';

      content.innerHTML = `
        ${shop.photo
          ? `<img src="${shop.photo}" alt="${shop.name}" class="modal-img" style="object-fit:cover;" onerror="this.outerHTML='<div class=modal-img-placeholder>${cat.icon}</div>'" />`
          : `<div class="modal-img-placeholder">${cat.icon}</div>`
        }
        <div class="modal-body">
          <div class="modal-badge">${cat.icon} ${cat.label}</div>

          ${isPersonal
            ? `<div class="modal-title">${shop.owner}</div>
               <div style="font-size:14px;color:var(--text-muted);margin-top:2px;margin-bottom:2px;font-style:italic">${shop.name}</div>`
            : `<div class="modal-title">${shop.name}</div>
               ${shop.owner ? `<div style="font-size:13px;color:var(--text-muted);margin-top:2px">মালিক: <span style="color:var(--gold-light);font-weight:600">${shop.owner}</span></div>` : ''}`
          }
          <div class="modal-divider"></div>

          <div class="modal-info-row">
            <span class="info-icon">📍</span>
            <div>
              <div class="info-label">ঠিকানা</div>
              <div>${shop.address || shop.area}</div>
            </div>
          </div>

          ${shop.description ? `
          <div class="modal-info-row">
            <span class="info-icon">📝</span>
            <div>
              <div class="info-label">বিবরণ</div>
              <div>${shop.description}</div>
            </div>
          </div>` : ''}

          ${shop.phone ? `
          <div class="modal-info-row">
            <span class="info-icon">📞</span>
            <div>
              <div class="info-label">ফোন নম্বর</div>
              <div>${shop.phone}</div>
            </div>
          </div>` : ''}

          ${shop.maplink ? `
          <div class="modal-info-row">
            <span class="info-icon">🗺️</span>
            <div>
              <div class="info-label">লোকেশন</div>
              <a href="${shop.maplink}" target="_blank">গুগল ম্যাপে দেখুন</a>
            </div>
          </div>` : ''}

          ${fbRow}

          <div class="contact-buttons">
            ${phoneBtns}
            ${waBtns}
            ${mapBtn}
          </div>
        </div>
      `;

      document.getElementById('modalOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    function closeModalOutside(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    // ─────────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────────
    function hideLoading() {
      document.getElementById('loadingEl').style.display = 'none';
      document.getElementById('resultsInfo').style.display = 'block';
    }

    // ─────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────
    loadShops();
